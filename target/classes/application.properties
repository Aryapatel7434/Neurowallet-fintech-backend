spring.application.name=smartwallet-backend

spring.datasource.url=jdbc:mysql://localhost:3306/smartwalletdb
spring.datasource.username=root
spring.datasource.password=Arya

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

server.port=8080

spring.cache.type=simple

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=neurowallet-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Application Info
management.info.env.enabled=true
management.health.mail.enabled=false
management.health.redis.enabled=false
info.app.name=NeuroWallet AI Fintech Platform
info.app.description=Smart Wallet Backend with JWT, Kafka, Docker, MySQL and Monitoring
info.app.version=1.0.0

logging.file.name=logs/neurowallet.log

logging.level.root=INFO

logging.level.com.smartwallet=DEBUG

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# Logging Configuration
# ===============================

logging.level.root=INFO
logging.level.com.smartwallet=DEBUG

logging.file.name=logs/neurowallet-app.log

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %level - [%X{requestId}] - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %level - [%X{requestId}] - %logger{36} - %msg%n

# Reduce Kafka unnecessary warning logs
logging.level.org.apache.kafka=WARN
logging.level.kafka=WARN
logging.level.org.springframework.kafka=WARN

logging.level.org.apache.kafka=ERROR
logging.level.kafka=ERROR
logging.level.org.springframework.kafka=ERROR